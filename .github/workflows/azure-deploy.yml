name: Deploy to Azure Web App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # ← đổi v3 → v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # ← đổi v3 → v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Zip dist folder
        run: zip -r dist.zip dist/ # ← thêm bước zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hidoapporder
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist.zip # ← deploy file zip thay vì folder
